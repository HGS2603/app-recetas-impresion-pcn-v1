<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>APP Recetas de Impresion PCN - V1.1A</title>
  <style>
    :root {
      --blue: #123c69;
      --cyan: #20a7b8;
      --ink: #172033;
      --muted: #64748b;
      --line: #d9e2ec;
      --bg: #f5f7fb;
      --card: #ffffff;
      --danger: #b42318;
      --success: #12715b;
      --warning: #996a13;
      --shadow: 0 12px 30px rgba(18, 60, 105, 0.12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      letter-spacing: 0;
    }

    button, input, select, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .login-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px 14px;
      background: linear-gradient(135deg, #123c69 0%, #1f9aad 100%);
    }

    .login-card,
    .card {
      width: 100%;
      background: var(--card);
      border: 1px solid rgba(217, 226, 236, 0.9);
      border-radius: 16px;
      box-shadow: 0 10px 26px rgba(18, 60, 105, 0.08);
    }

    .login-card {
      max-width: 430px;
      padding: 24px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.22);
    }

    h1, h2, h3 { color: var(--blue); line-height: 1.2; }
    h1 { margin: 0; font-size: 26px; }
    h2 { margin: 0; font-size: 22px; }
    h3 { margin: 0; font-size: 17px; }
    p { line-height: 1.45; }

    .muted { color: var(--muted); }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: linear-gradient(135deg, #0f345d 0%, #123c69 58%, #16899a 100%);
      color: #fff;
      padding: 10px 12px;
      box-shadow: var(--shadow);
    }

    .topbar-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand { min-width: 0; }
    .brand strong { display: block; font-size: 14px; letter-spacing: 0.2px; }
    .brand span { display: block; color: #d9f3f7; font-size: 11px; margin-top: 2px; }

    .session {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .session-name { display: none; color: #ecfeff; text-align: right; font-size: 12px; }

    .page {
      width: 100%;
      max-width: 1120px;
      margin: 0 auto;
      padding: 16px 12px 36px;
    }

    .card { padding: 16px; }

    .topbar .btn.ghost {
      min-height: 36px;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 13px;
      background: rgba(255,255,255,0.08);
    }

    .grid,
    .stack,
    .result-list {
      display: grid;
      gap: 12px;
    }

    .grid.two,
    .grid.three,
    .menu-grid {
      grid-template-columns: minmax(0, 1fr);
    }

    .field { display: grid; gap: 6px; min-width: 0; }
    label, .label { color: #334155; font-size: 13px; font-weight: 700; }

    input, select, textarea {
      width: 100%;
      min-width: 0;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
      font-size: 16px;
    }

    textarea { min-height: 92px; resize: vertical; }

    input:focus, select:focus, textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(32, 167, 184, 0.18);
    }

    .btn {
      min-height: 48px;
      border-radius: 12px;
      padding: 11px 14px;
      background: #e9eef5;
      color: var(--blue);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 700;
      text-align: center;
      overflow-wrap: anywhere;
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .btn:active { transform: scale(0.99); }

    .btn.primary { background: var(--blue); color: #fff; }
    .btn.accent { background: var(--cyan); color: #062b34; }
    .btn.ghost { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.35); }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-row .btn { flex: 1 1 150px; }

    .section-title {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 14px;
    }

    .section-title p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

    .menu-grid {
      display: grid;
      gap: 12px;
    }

    .module {
      min-height: 108px;
      width: 100%;
      text-align: left;
      align-items: stretch;
      justify-content: space-between;
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(217, 226, 236, 0.9);
      box-shadow: 0 12px 26px rgba(18, 60, 105, 0.08);
      padding: 15px;
      border-radius: 16px;
      display: grid;
      gap: 10px;
    }

    .module strong { display: block; color: var(--blue); font-size: 17px; margin: 0; }
    .module span { display: block; color: var(--muted); font-weight: 400; font-size: 13px; line-height: 1.35; }
    .module.locked { background: #f1f5f9; box-shadow: none; }
    .module-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .module-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: inline-grid;
      place-items: center;
      background: linear-gradient(135deg, #eaf7f9, #edf4ff);
      color: var(--blue);
      font-size: 19px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .module.locked .module-icon { background: #e2e8f0; color: #64748b; }
    .module-action {
      margin-top: 2px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border-radius: 999px;
      background: #eaf7f9;
      color: #0f6470;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .pill.warning { background: #fff4d6; color: var(--warning); }
    .pill.success { background: #dff8ee; color: var(--success); }
    .pill.lock { background: #e2e8f0; color: #475569; }

    .result-card {
      width: 100%;
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      display: grid;
      gap: 8px;
      color: var(--ink);
    }

    .result-card strong { color: var(--blue); font-size: 16px; overflow-wrap: anywhere; }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .kv {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 9px;
      margin-top: 8px;
    }

    .kv div {
      min-width: 0;
      padding: 10px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #edf2f7;
    }

    .kv b { display: block; margin-bottom: 3px; color: #475569; font-size: 12px; }
    .kv span { overflow-wrap: anywhere; }

    .recipe-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .unit-card {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fbfdff;
    }

    .menu-hero {
      margin-bottom: 14px;
      background: linear-gradient(135deg, #ffffff 0%, #f2fbfd 100%);
      overflow: hidden;
      position: relative;
    }

    .menu-hero::after {
      content: "";
      position: absolute;
      width: 130px;
      height: 130px;
      border-radius: 999px;
      right: -48px;
      top: -50px;
      background: rgba(32, 167, 184, 0.12);
    }

    .menu-hero h2 { margin-bottom: 5px; }
    .menu-hero p { margin: 0; color: var(--muted); font-size: 13px; }
    .menu-hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .screen-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #0f6470;
      background: #eaf7f9;
      border: 1px solid #c7edf2;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .message {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 30;
      padding: 12px 14px;
      border-radius: 8px;
      color: #fff;
      background: var(--blue);
      box-shadow: var(--shadow);
      transform: translateY(140%);
      transition: transform 0.18s ease;
      font-weight: 700;
    }

    .message.show { transform: translateY(0); }
    .message.error { background: var(--danger); }
    .message.success { background: var(--success); }

    .loading {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: rgba(245, 247, 251, 0.78);
      display: none;
      place-items: center;
      color: var(--blue);
      font-weight: 800;
    }

    .loading.show { display: grid; }

    @media (max-width: 480px) {
      .btn-row {
        display: grid;
        grid-template-columns: 1fr;
      }

      .section-title {
        display: block;
      }

      .topbar-inner {
        align-items: flex-start;
      }

      .session {
        gap: 6px;
      }

      .brand strong {
        max-width: 170px;
      }
    }

    @media (min-width: 720px) {
      .page { padding: 24px 20px 44px; }
      .session-name { display: block; }
      .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.three, .menu-grid, .kv { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="loading" class="loading">Cargando</div>
  <div id="message" class="message"></div>

  <script>
    const BASE_URL = 'https://script.google.com/macros/s/AKfycbw-WSRTqa1A1ViGNIOZQONKJ3NhqHQUhK-dryrInrwct1IAJ6MFQnR3tY36OmrE5keyjw/exec';

    const state = {
      user: null,
      catalogos: { familias: [], maquinas: [] },
      currentFicha: null,
      currentRecetaId: null,
      unidadesDraft: []
    };

    document.addEventListener('DOMContentLoaded', initApp);

    function initApp() {
      const storedUser = localStorage.getItem('pcn_recetas_user');
      if (storedUser) {
        try { state.user = JSON.parse(storedUser); }
        catch (error) { localStorage.removeItem('pcn_recetas_user'); }
      }

      mostrarCargando();
      api('inicializarEstructuraV1')
        .then(() => api('getCatalogosIniciales'))
        .then((res) => {
          if (!res.ok) throw new Error(res.mensaje);
          state.catalogos = res.data || {};
          if (state.user) mostrarMenuPrincipal();
          else mostrarLogin();
        })
        .catch((error) => mostrarLogin(error.message))
        .finally(ocultarCargando);
    }

    function mostrarLogin(errorMessage) {
      state.currentFicha = null;
      document.getElementById('app').innerHTML = `
        <main class="login-wrap">
          <section class="login-card">
            <h1>APP Recetas de Impresion PCN</h1>
            <p class="muted">Consulta, captura, versiona y valida recetas operativas de impresion.</p>
            <form class="grid" onsubmit="hacerLogin(event)">
              <div class="field">
                <label for="loginUsuario">Usuario</label>
                <input id="loginUsuario" name="usuario" autocomplete="username" required>
              </div>
              <div class="field">
                <label for="loginPassword">Contrasena</label>
                <input id="loginPassword" name="password" type="password" autocomplete="current-password" required>
              </div>
              <button class="btn primary" type="submit">Entrar</button>
              <div class="muted">Usuario inicial: admin / admin123</div>
            </form>
          </section>
        </main>`;
      if (errorMessage) mostrarMensaje(errorMessage, 'error');
    }

    function hacerLogin(event) {
      event.preventDefault();
      const form = event.target;
      mostrarCargando();
      api('loginUsuario', form.usuario.value.trim(), form.password.value)
        .then((res) => {
          if (!res.ok) throw new Error(res.mensaje);
          state.user = res.data.user;
          localStorage.setItem('pcn_recetas_user', JSON.stringify(state.user));
          mostrarMensaje(res.mensaje || 'Login correcto.', 'success');
          return api('getCatalogosIniciales');
        })
        .then((res) => {
          if (!res.ok) throw new Error(res.mensaje);
          state.catalogos = res.data || {};
          mostrarMenuPrincipal();
        })
        .catch((error) => mostrarMensaje(error.message, 'error'))
        .finally(ocultarCargando);
    }

    function mostrarMenuPrincipal() {
      renderShell(`
        <section class="card menu-hero">
          <span class="screen-label">V1.1A · Menú operativo</span>
          <h2>Recetas de impresión</h2>
          <p>Consulta primero el SKU. Si no existe, crea el producto y después captura su receta.</p>
          <div class="menu-hero-meta">
            <span class="pill success">GitHub Pages</span>
            <span class="pill success">API Apps Script</span>
            <span class="pill warning">V1 estable</span>
          </div>
        </section>
        <section class="menu-grid">
          ${moduleButton('Buscar receta', 'Consulta SKU, familia, máquina y receta vigente.', 'mostrarBusquedaProductos()', true)}
          ${moduleButton('Alta producto', 'Crea un SKU nuevo con estatus Sin receta.', 'mostrarAltaProducto()', can('permiso_crear_producto'))}
          ${moduleButton('Familias de color', 'Agrupa tonos y referencias visuales.', 'mostrarFamiliasColor()', canAny(['permiso_crear_producto', 'permiso_crear_receta']))}
          ${moduleButton('Crear receta', 'Genera una receta borrador por máquina.', 'mostrarCrearReceta()', can('permiso_crear_receta'))}
          ${moduleButton('Administración', 'Valida estructura y permisos base.', 'mostrarAdministracionBasica()', can('permiso_admin'))}
          ${moduleButton('Corridas', 'Registro real de producción en fase posterior.', 'moduloBloqueado()', false, true)}
          ${moduleButton('Retenciones', 'Referencias de color en fase posterior.', 'moduloBloqueado()', false, true)}
          ${moduleButton('Reportes', 'Indicadores y análisis en fase posterior.', 'moduloBloqueado()', false, true)}
        </section>`);
    }

    function mostrarBusquedaProductos() {
      renderShell(`
        ${viewHeader('Buscar SKU / Receta', 'Consulta rapida por SKU, descripcion, familia de color o maquina.')}
        <section class="card">
          <form id="searchForm" class="grid two" onsubmit="buscarProductosUI(event)">
            ${field('SKU', 'sku')}
            ${field('Descripcion', 'descripcion')}
            <div class="field">
              <label for="familia_color_id">Familia de color</label>
              <select id="familia_color_id" name="familia_color_id">
                <option value="">Todas</option>
                ${familiaOptions()}
              </select>
            </div>
            ${field('Maquina', 'maquina', '', false, false, 'maquinasList')}
            ${maquinasDatalist()}
            <div class="btn-row">
              <button class="btn primary" type="submit">Buscar</button>
              <button class="btn" type="button" onclick="mostrarAltaProducto()" ${can('permiso_crear_producto') ? '' : 'disabled'}>Alta producto</button>
            </div>
          </form>
        </section>
        <section id="resultados" class="result-list" style="margin-top:12px;"></section>`);
    }

    function buscarProductosUI(event) {
      if (event) event.preventDefault();
      const form = document.getElementById('searchForm');
      const filtros = formToObject(form);
      mostrarCargando();
      api('buscarProductos', filtros)
        .then((res) => {
          if (!res.ok) throw new Error(res.mensaje);
          renderResultadosProductos((res.data && res.data.resultados) || []);
        })
        .catch((error) => mostrarMensaje(error.message, 'error'))
        .finally(ocultarCargando);
    }

    function renderResultadosProductos(resultados) {
      const container = document.getElementById('resultados');
      if (!resultados.length) {
        container.innerHTML = `
          <article class="card">
            <strong>No se encontraron productos activos.</strong>
            <p class="muted">Si el SKU no existe, crea el producto con estatus Sin receta antes de capturar la receta.</p>
            <button class="btn primary" onclick="mostrarAltaProducto()" ${can('permiso_crear_producto') ? '' : 'disabled'}>Crear producto</button>
          </article>`;
        return;
      }

      container.innerHTML = resultados.map((row) => `
        <button class="result-card" type="button" onclick="abrirFichaProducto('${escAttr(row.producto_id)}')">
          <strong>${esc(row.sku)} - ${esc(row.descripcion)}</strong>
          <div class="meta">
            <span class="pill ${isYes(row.receta_vigente) ? 'success' : 'warning'}">Receta vigente: ${esc(row.receta_vigente)}</span>
            <span>Familia: ${esc(row.familia_color || 'Sin familia')}</span>
            <span>Maquinas: ${esc(row.maquinas_vigentes || 'Sin vigente')}</span>
            <span>Recetas: ${esc(row.total_recetas)}</span>
          </div>
        </button>`).join('');
    }

    function abrirFichaProducto(producto_id) {
      mostrarCargando();
      api('getFichaProducto', producto_id)
        .then((res) => {
          if (!res.ok) throw new Error(res.mensaje);
          state.currentFicha = res.data;
          renderFichaProducto();
        })
        .catch((error) => mostrarMensaje(error.message, 'error'))
        .finally(ocultarCargando);
    }

    function renderFichaProducto() {
      const ficha = state.currentFicha;
      if (!ficha) return mostrarBusquedaProductos();
      const p = ficha.producto;
      const recetas = ficha.recetas || [];
      renderShell(`
        ${viewHeader('Ficha del producto', `${esc(p.sku)} - ${esc(p.descripcion)}`)}
        <section class="card">
          <div class="recipe-head">
            <div>
              <h3>${esc(p.sku)}</h3>
              <div class="muted">${esc(p.descripcion)}</div>
            </div>
            <span class="pill ${p.estatus_producto === 'Con receta vigente' ? 'success' : 'warning'}">${esc(p.estatus_producto || 'Sin receta')}</span>
          </div>
          <div class="kv">
            <div><b>Familia de color</b><span>${esc(ficha.familia ? ficha.familia.nombre_familia : 'Sin familia')}</span></div>
            <div><b>Presentacion</b><span>${esc(p.presentacion || '-')}</span></div>
            <div><b>Material base</b><span>${esc(p.material_base || '-')}</span></div>
            <div><b>Medidas</b><span>${esc(p.medidas_producto || '-')}</span></div>
            <div><b>Gramaje</b><span>${esc(p.gramaje || '-')}</span></div>
            <div><b>Colores estimados</b><span>${esc(p.colores_estimados || '-')}</span></div>
          </div>
          <div class="btn-row">
            <button class="btn" onclick="mostrarBusquedaProductos()">Volver a busqueda</button>
            <button class="btn" onclick="mostrarAltaProducto('${escAttr(p.producto_id)}')" ${can('permiso_crear_producto') ? '' : 'disabled'}>Editar producto</button>
            <button class="btn primary" onclick="mostrarCrearReceta('${escAttr(p.producto_id)}')" ${can('permiso_crear_receta') ? '' : 'disabled'}>Crear receta</button>
          </div>
        </section>
        <section class="section-title" style="margin-top:18px;">
          <div>
            <h2>Recetas existentes</h2>
            <p>La receta vigente se consulta como referencia operativa; cualquier cambio importante requiere nueva version.</p>
          </div>
        </section>
        <section class="stack">
          ${recetas.length ? recetas.map(renderRecipeCard).join('') : '<article class="card"><strong>Producto sin receta.</strong><p class="muted">Crea una receta borrador para capturar sus unidades.</p></article>'}
        </section>`);
    }

    function mostrarAltaProducto(producto_id) {
      const producto = producto_id && state.currentFicha ? state.currentFicha.producto : null;
      renderShell(`
        ${viewHeader(producto ? 'Editar producto' : 'Alta de producto', 'El producto se identifica por SKU y se crea inicialmente como Sin receta.')}
        <section class="card">
          <form class="grid two" onsubmit="guardarProductoUI(event)">
            <input type="hidden" name="producto_id" value="${escAttr(producto ? producto.producto_id : '')}">
            ${field('SKU', 'sku', producto ? producto.sku : '', true)}
            ${field('Descripcion', 'descripcion', producto ? producto.descripcion : '', true)}
            <div class="field">
              <label for="familia_color_id">Familia de color</label>
              <select id="familia_color_id" name="familia_color_id">
                <option value="">Sin familia</option>
                ${familiaOptions(producto ? producto.familia_color_id : '')}
              </select>
            </div>
            ${field('Presentacion', 'presentacion', producto ? producto.presentacion : '')}
            ${field('Medidas producto', 'medidas_producto', producto ? producto.medidas_producto : '')}
            ${field('Material base', 'material_base', producto ? producto.material_base : '')}
            ${field('Gramaje', 'gramaje', producto ? producto.gramaje : '')}
            ${field('Colores estimados', 'colores_estimados', producto ? producto.colores_estimados : '')}
            ${textarea('Observaciones tecnicas', 'observaciones_tecnicas', producto ? producto.observaciones_tecnicas : '')}
            <div class="btn-row">
              <button class="btn primary" type="submit">${producto ? 'Actualizar producto' : 'Guardar producto'}</button>
              <button class="btn" type="button" onclick="${producto ? `abrirFichaProducto('${escAttr(producto.producto_id)}')` : 'mostrarMenuPrincipal()'}">Cancelar</button>
            </div>
          </form>
        </section>`);
    }

    function guardarProductoUI(event) {

    }

    function textarea(labelText, name, val, disabled) {

      return `
        <div class="field" style="grid-column:1/-1;">

    function formToObject(form) {
      const data = {};
      Array.from(new FormData(form).entries()).forEach(([key, val]) => { data[key] = String(val).trim(); });
      return data;
    }

    function attachUser(data) {
      data._usuario = state.user;
      return data;
    }

    function can(permission) {
      if (!state.user) return false;
      return isYes(state.user.permiso_admin) || isYes(state.user[permission]);
    }

    function canAny(permissions) {
      return permissions.some(can);
    }

    function isYes(v) {
      return ['si', 'sí', 's', 'yes', 'true', '1'].includes(String(v || '').trim().toLowerCase());
    }

    function value(obj, key, fallback) {
      return obj && obj[key] ? obj[key] : fallback;
    }

    async function api(action, ...args) {
      if (!BASE_URL || BASE_URL === 'PEGA_AQUI_LA_URL_DE_TU_WEB_APP') {
        throw new Error('Configura BASE_URL con la URL publicada de Apps Script.');
      }

      const response = await fetch(BASE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action, args }),
        redirect: 'follow'
      });

      if (!response.ok) throw new Error('No se pudo conectar con la API de Apps Script.');
      const payload = await response.json();
      if (!payload || typeof payload.ok === 'undefined') throw new Error('La API devolvio una respuesta invalida.');
      return payload;
    }

    function mostrarMensaje(texto, tipo) {
      const message = document.getElementById('message');
      message.textContent = texto || '';
      message.className = `message show ${tipo || ''}`;
      clearTimeout(message._timer);
      message._timer = setTimeout(() => { message.className = 'message'; }, 3600);
    }

    function mostrarCargando() {
      document.getElementById('loading').classList.add('show');
    }

    function ocultarCargando() {
      document.getElementById('loading').classList.remove('show');
    }

    function esc(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escAttr(value) {
      return esc(value).replace(/`/g, '&#096;');
    }
  </script>
</body>
</html>
